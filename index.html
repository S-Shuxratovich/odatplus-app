<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odat+</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #5288c1; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Odat+</h1>
        <p id="user-info">Salom!</p>
        <input type="text" id="habitName" placeholder="Odat nomini yozing...">
        <button onclick="saveHabit()">Saqlash</button>
        <button onclick="Telegram.WebApp.close()" style="background:#ff7675; margin-top:10px;">Yopish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const user = tg.initDataUnsafe.user;
        if (user) document.getElementById('user-info').innerText = `Salom, ${user.first_name}!`;

        function saveHabit() {
            const habit = document.getElementById('habitName').value;
            if (!habit) return alert("Odat nomini kiriting!");
            
            tg.sendData(JSON.stringify({ "action": "add_habit", "name": habit }));
            document.getElementById('habitName').value = "";
        }
    </script>
</body>
</html>
