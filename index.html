<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odat+ Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 10px; background: #5288c1; color: white; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3d71a8; }
        .yopish-btn { background: #ff7675; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Odat+</h1>
        <p id="user-info">Yuklanmoqda...</p>
        
        <input type="text" id="habitName" placeholder="Yangi odatni kiriting...">
        <br>
        <button onclick="saveHabit()">Saqlash</button>
        <br>
        <button class="yopish-btn" onclick="Telegram.WebApp.close()">Yopish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Foydalanuvchini kutib olish
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-info').innerText = `Salom, ${user.first_name}!`;
        }

        // Odatni botga jo'natish funksiyasi
        function saveHabit() {
            const habit = document.getElementById('habitName').value;
            if (habit.trim() === "") {
                alert("Iltimos, odat nomini kiriting!");
                return;
            }

            // Ma'lumotni botga yuborish
            tg.sendData(JSON.stringify({ "action": "add_habit", "name": habit }));
            
            // Foydalanuvchiga tasdiq xabari
            alert("✅ " + habit + " saqlandi!");
            document.getElementById('habitName').value = ""; // Inputni tozalash
        }
    </script>
</body>
</html>
