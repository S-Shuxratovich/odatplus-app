<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Odat+ Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Odat+</h1>
        <p id="user-info">Yuklanmoqda...</p>
        <button onclick="Telegram.WebApp.close()">Yopish</button>
    </div>

    <script>
        // Telegram WebApp ishga tushishi
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Foydalanuvchi ma'lumotlarini olish
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-info').innerText = 
                `Salom, ${user.first_name}! \nSizning ID: ${user.id}`;
        } else {
            document.getElementById('user-info').innerText = "Ma'lumot topilmadi.";
        }
    </script>
</body>
</html>
